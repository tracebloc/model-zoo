name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/requirements/lint.txt
      - run: pip install -r .github/requirements/lint.txt
      - run: ruff check --select=F401,F821,E9 model_zoo/

  test-pytorch:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/requirements/pytorch.txt
      - run: pip install -r .github/requirements/pytorch.txt
      - run: pytest tests/ -v

  test-tensorflow:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/requirements/tensorflow.txt
      - run: pip install -r .github/requirements/tensorflow.txt
      - run: pytest tests/ -v

  test-sklearn:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/requirements/sklearn.txt
      - run: pip install -r .github/requirements/sklearn.txt
      - run: pytest tests/ -v

  test-survival:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/requirements/survival.txt
      - run: pip install -r .github/requirements/survival.txt
      - run: pytest tests/ -v
